name: Publish to pub.dev

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

jobs:
    publish:
        permissions:
            id-token: write
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up Dart & OIDC
              uses: dart-lang/setup-dart@v1

            - name: Install dependencies
              run: dart pub get

            - name: Publish
              run: dart pub publish --force
